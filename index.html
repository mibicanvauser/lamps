<!DOCTYPE html>
<html lang= "en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Lamp Controller</title>
	<link rel="icon" type="image/x-icon" href="./favicon.ico">
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#1c1c1e">
	<link rel="icon" type="image/png" href="./icon-192.png.png">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> 
	<meta name="apple-mobile-web-app-title" content="Lamp Controller"> 
	<link rel="apple-touch-icon" href="./icon-192.png.png">
	<link rel="apple-touch-icon" sizes="152x152" href="./icon-152.png.png">
	<link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png.png">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

<style>
html {
	overscroll-behavior: none;
}

/*reset everything*/
* {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
	user-select: none;
	-webkit-tap-highlight-color: transparent;
}

/*font styling*/

body {

	padding-top: env(safe-area-inset-top, 40px);
	padding-bottom: env(safe-area-inset-bottom, 30px);
	overscroll-behavior: none;	
	font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
	background-color: #0b0b0c;
	color: #f5f5f7;
	display: flex;
	justify-content: center;
	padding-left: 20px;
	padding-right: 20px;
}

/*app container*/

.app-container {
	width: 100%;
	max-width: 400px;
	display: flex;
	flex-direction: column;
	gap: 15px;
	padding: 10px;
	margin: 0 auto;
	box-sizing: border-box;
	}


/*create panel cards (buttons) for each color preset/mode*/

.panel-card {
	position: relative;
	background: #1c1c1e;
	border-radius: 14px;
	padding: 16px;
	display: flex;
	flex-direction: column;
	gap: 15px;
	width: 100%;
	box-shadow: 
	0 8px 32px 0 rgba(0, 0, 0, 0.5);
	transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
	z-index: 1;
	will-change: transform;
	isolation: isolate;
	}

.panel-card::before {
	content: '';
	position: absolute;
	top: -8px;
	left: -8px;
	right: -8px;
	bottom: -8px;
	border-radius: 20px;
	background: var(--accent-glow, rgba(44, 44, 46, 0.2));
	filter: blur(35px);
	z-index: -1;

	opacity: var(--before-alpha, 0.85);
	transition: background 0.7s ease-in-out, opacity 0.5s ease-in-out, filter 0.5s ease-in-out;
	}

.panel-card::after {
	content: '';
	position: absolute;
	top: -8px;
	left: -8px;
	right: -8px;
	bottom: -8px;
	border-radius: 20px;
	background: var(--mode-gradient, linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0)));
	filter: blur(35px);
	z-index: -1;
	opacity: var(--gradient-alpha, 0);
	pointer-events: none;
	transition: opacity 0.5s ease-in-out;

}



.touch-ripple {
	position: fixed;
	top: 0;
	left: 0;
	width: 24px;
	height: 24px;
	border: 2px solid rgba(255, 255, 255, 0.55);
	border-radius: 50%;
	pointer-events: none;
	transform: translate(-50%, -50%) scale(1);
	z-index: 9999;
	animation: ripple-out 0.45s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}

.touch-ripple-accent {
	border-color: var(--accent-glow);
	box-shadow: 0 0 12px var(--accent-glow);
}

@keyframes ripple-out {
	0% {
		transform: translate(-50%, -50%) scale(0.4);
		opacity: 1;
	}

	100% {
		transform: translate(-50%, -50%) scale(0.4);
		opacity: 0;
	}
}

	
h3 {
	font-size: 0.85rem;
	color: #ffffff;
	text-transform: uppercase;
	letter-spacing: 0.5px;
	margin-bottom: 5px;
}

.panel-card h3 {
	mix-blend-mode: difference;
	transition: color 0.4s ease-in-out;
}

/*styling for controls inside the card*/
.control row {
	display: flex;
	justify-content: space-between;
	align-items: center;
	font-size: 1.1rem;
}

input[type="range"] {
	width: 100%;
	accent-color: #0a84ff;
	background: #3a3a3c;
	height: 6px;
	border-radius: 3px;
	appearance: none;
	margin-top: 5px;
}
	

/*styling for button grid*/
.button-grid {
	display: grid;
	grid-template-columns: repeat(3,1fr);
	gap: 10px;
	width: 100%;
	}
	
.mode-macro {
	grid-column: span 3;
	background: #2c2c2e;
	color: #fff;
	border: 1px solid #3a3a3c;
	padding: 14px 5px;
	border-radius: 10px;
	font-weight: 600;
	font-size: 0.95rem;
	cursor: pointer;
	text-align: center;
	width: 100%;
	transition: background-color 0.3s ease, color 0.3s ease;
	}

.color-macro {
	border: none;
	padding: 14px 5px;
	border-radius: 10px;
	font-weight: 600;
	cursor: pointer;
	text-align: center;
	width: 100%;
	padding-top: 22px;
	padding-bottom: 22px;
	transition: background-color 0.3s ease, color 0.3s ease;
}

.system-reset-btn {
	width: 100%;
	height: 45px;
	backgroundColor: #2c2c2e;
	color: #ff453a;
	border: 1px solid #3a3a3c;
	border-radius: 8px;
	font-weight: bold;
	margin-top: 15px;
	cursor: pointer;
}
.system-reset-btn:active {
	background-color: #000000;
}
	

.toggle-slider {
	background-color: #3a3a3c;
	transition: 0.25s;
	border-radius: 34px;
}

input:checked + .toggle-slider {
	background-color: #34c759;
}

input:checked + .toggle-slider:before {
	transform: translateX(20px);
}


#picker-container {
	display: flex;
	justify-content: center;
	margin-top: 10px;
	touch-action: none;
	
	
}

/* Power button styles*/
#power-btn {
	width: 100%;
	border: none;
	padding: 14px 0;
	border-radius: 10px;
	font-weight: bold;
	font-size: 1rem;
	cursor: pointer;
	transition: background-color 0.2s, color 0.2s;
	}

/*Active state*/
.power-on-style {
	background-color: #fffff;
    color: #000000;
}

/*Off state*/
.power-off-style {
	background-color: #000000;
    color: #fff;
}

.panel-card, #controls-wrapper {
	transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
	opacity: 1;
	transform: translateY(0);
}

.fade-out {
	opacity: 0 !important;
	transform: translateY(-10px) !important;
}

.fade-init {
	opacity: 0;
	transform: translateY(10px);
}

.color-macro.active {
	transform: scale(1.1);
	outline: 3px solid #ffffff;
	outline-offset: 2px;
	box-shadow: 0 0 15px rgba(255,255,255, 0.5);
	z-index: 10;
}


	
</style>
</head>



<body>
	<div class ="app-container">
		<div id="controls-wrapper" style="display:none; flex-direction: column; gap: 15px; width: 100%;">
		<section class="panel-card">
		<div style="display: flex; justify-content: space-between; align-items: center;">
	<h3>System Control</h3>
	<button id ="gear-btn" style="background: none; border: none; color: #8e8e93; font-size: 1.2rem; cursor: pointer;">⚙️</button>
	</div>
	<div class=".control row">
	<span style="color: #ffffff; z-index: 5;">Power</span>
	

<button id="power-btn" class="power-off-style">OFF</button>


</div>

<div style="display: flex; flex-direction: column; gap: 5px; margin-top: 5px;">
<label for="brightness-slider" style="color: #ffffff; z-index: 5;">Brightness: <span id="brightness-pct">100%</span></label>
<input type="range" id="brightness-slider" min="3" max="255" value="100">

<button id="resetESPBtn" class="control-btn system-reset-btn">
Reset System
</button>

</div>
</section>

<!Buttons for color presets>	

<section class="panel-card"> <h3>Presets</h3>
<div class="button-grid">
<button class="color-macro" data-hex="#RED" style="background: #FF0000;"></button>
<button class="color-macro" data-hex="#ORANGE" style="background: #ff4800;"></button>
<button class="color-macro" data-hex="#YELLOW" style="background: #EEFF00;"></button>
<button class="color-macro" data-hex="#GREEN" style="background: #00FF00;"></button>
<button class="color-macro" data-hex="#BLUE" style="background: #0033ff;"></button>
<button class="color-macro" data-hex="#INDIGO" style="background: #4B0082;"></button>
<button class="color-macro" data-hex="#PURPLE" style="background: #800080;"></button>
<button class="color-macro" data-hex="#PINK" style="background: #FF007F;"></button>
<button class="color-macro" data-hex="#WHITE" style="background: #FFFFFF;"></button>

<!Buttons for lighting modes (sends a text string)>
<button class="mode-macro" id="breathe">peak</button>
<button class="mode-macro" id="rainbow">Rainbow (whimsical)</button>


</div>
</section>

<section class="panel-card">
	<h3>Custom Color</h3>
<!Container for iro.js color wheel (script drops it in here)>
	<div id="picker-container"></div>

<!Container for timer>

<div id="timer-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; margin: 20px 0; padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.08); border-bottom: 1px solid rgba(255,255,255,0.08); width: 100%;">

<div style="display: flex; gap: 8px; width: 100%; justify-content: space-between; align-items: center; flex-wrap: nowrap;">

<span style="font-size: 14px; color: #ffffff; font-weight: 500; mix-blend-mode: difference;">Timer:</span>

<div class="timer-segment" data-value="15" style="display: flex; align-items: center; justify-content: center; background: #2c2c2e; color: #ffffff; height: 38px; width: 44px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s;">15</div>

<div class="timer-segment" data-value="30" style="display: flex; align-items: center; justify-content: center; background: #2c2c2e; color: #ffffff; height: 38px; width: 44px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s;">30</div>

<div class="timer-segment" data-value="45" style="display: flex; align-items: center; justify-content: center; background: #2c2c2e; color: #ffffff; height: 38px; width: 44px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s;">45</div>

<div class="timer-segment" data-value="60" style="display: flex; align-items: center; justify-content: center; background: #2c2c2e; color: #ffffff; height: 38px; width: 44px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s;">1h</div>


<button id="timer-toggle-btn" style="display: flex; align-items: center; justify-content: center; background: #ffffff; color: #000000; border: none; height: 38px; padding: 0 14px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; transition: all 0.2s ease;">Start</button>

</div>

<div id="countdown-wrapper" style="width: 100%; display: none; justify-content: center; margin-top: 10px;">
<span id="timer-countdown-display" style="font-size: 13px; color: #ffffff; font-family: monospace; font-weight: bold; mix-blend-mode: difference; isolation: isolate;">--:--</span>
</div>
</div>
</section>

<section class="panel-card" style="display: flex; flex-direction: column; gap: 15px;">
	<h3>the land of the free (we are cooked)</h3>

<div style="position: relative; z-index: 5; margin: 10px 0;">

	<button id="mic-toggle-btn" class="control-btn" style="width: 100%; border: none; padding: 14px 0; border-radius: 10px; font-weight: bold; font-	size: 1rem; background: #ffffff; color: #000000; cursor: pointer;">
START MIC
	</button>
	</div>

<div style="margin-top: 10px;">
<span class="ui-label" style="font-size: 0.85rem; color: #ffffff; mix-blend-mode: difference; isolation: isolate;">Audio Level</span>
<div style="width: 100%; height: 8px; background: #2c2c2e; border-radius: 4px; overflow: hidden; margin-top: 5px;">
	<div id="mic-level-bar" style="width: 0%; height: 100%; background: #0a84ff; transition: width 0.05s ease;"></div>
	</div>
</div>
</section>
	

</div><section id="settings-card" class="panel-card" style="display: flex;">
	<h3>Communication Protocol Setup</h3>
<p style="font-size: 0.85rem; color: #8e8e93; margin-top: -5px; line-height: 1.3;">
	so we can talk to each other :)
</p>
<div style="display: flex; flex-direction: column; gap: 12px; margin-top: 5px;">
<div style="display: flex; flex-direction: column; gap: 4px;">
<label style ="font-size: 0.9rem; color: #fff;">Username</label>
<input type="text" id="setup-username" placeholder="(it's not sigmadestroyer5000)" style="width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; padding: 10px; color: #fff; font-size: 1rem; outline: none;">
</div>

<div style="display: flex; flex-direction: column; gap: 4px;">
<label style ="font-size: 0.9rem; color: #fff;">Key</label>
<input type="password" id="setup-key" placeholder="pleek i swear you only do this once" style="width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 8px; padding: 10px; color: #fff; font-size: 1rem; outline: none;">
</div>
<button id="save-settings-btn" style="width: 100%; border: none; background: #0a84ff; color: #fff; padding: 12px 0; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 5px; transition: background 0.2s;">Save & Connect</button>
</div>
</section>
</div><script src="app.js"></script>
</body>
</html>
